version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: sasya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sasya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: backend/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - USER_SERVICE_URL=http://user-service:8002
      - FARMER_SERVICE_URL=http://farmer-service:8003
      - DIGITAL_TWIN_SERVICE_URL=http://digital-twin:8004
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8005
      - ORCHESTRATOR_AGENT_URL=http://orchestrator-agent:8010
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      farmer-service:
        condition: service_started
      digital-twin:
        condition: service_started
      knowledge:
        condition: service_started
      orchestrator-agent:
        condition: service_started

  auth-service:
    build:
      context: ..
      dockerfile: backend/auth-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ..
      dockerfile: backend/user-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sasya
    depends_on:
      db:
        condition: service_healthy

  farmer-service:
    build:
      context: ..
      dockerfile: backend/farmer-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sasya
    depends_on:
      db:
        condition: service_healthy

  digital-twin:
    build:
      context: ..
      dockerfile: backend/digital-twin/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sasya
    depends_on:
      db:
        condition: service_healthy

  knowledge:
    build:
      context: ..
      dockerfile: backend/knowledge/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sasya
    depends_on:
      db:
        condition: service_healthy

  orchestrator-agent:
    build:
      context: ..
      dockerfile: agents/orchestrator/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - DIGITAL_TWIN_SERVICE_URL=http://digital-twin:8004
      - PLANNER_AGENT_URL=http://planner-agent:8011
      - VISION_AGENT_URL=http://vision-agent:8012
      - GEOSPATIAL_AGENT_URL=http://geospatial-agent:8013
      - MONITORING_AGENT_URL=http://monitoring-agent:8014

  planner-agent:
    build:
      context: ..
      dockerfile: agents/planner/Dockerfile
    ports:
      - "8011:8011"
    environment:
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8005

  vision-agent:
    build:
      context: ..
      dockerfile: agents/vision/Dockerfile
    ports:
      - "8012:8012"
    environment:
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8005

  geospatial-agent:
    build:
      context: ..
      dockerfile: agents/geospatial/Dockerfile
    ports:
      - "8013:8013"
    environment:
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8005

  monitoring-agent:
    build:
      context: ..
      dockerfile: agents/monitoring/Dockerfile
    ports:
      - "8014:8014"
    environment:
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8005

volumes:
  postgres_data:
