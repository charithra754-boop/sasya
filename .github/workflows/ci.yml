name: SasyaAI Core CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-common:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e common/
        pip install pytest httpx
    - name: Run unit tests
      run: |
        # Placeholder for unit tests execution
        echo "Running tests..."

  build-containers:
    runs-on: ubuntu-latest
    needs: test-common
    steps:
    - uses: actions/checkout@v3
    - name: Build gateway
      run: docker build -f backend/gateway/Dockerfile .
    - name: Build auth-service
      run: docker build -f backend/auth-service/Dockerfile .
    - name: Build user-service
      run: docker build -f backend/user-service/Dockerfile .
    - name: Build farmer-service
      run: docker build -f backend/farmer-service/Dockerfile .
